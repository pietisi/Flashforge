<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashForge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --border: #1e293b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      .card {
        width: min(640px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.65;
      }

      a {
        display: inline-block;
        background: var(--accent);
        color: #082f49;
        text-decoration: none;
        font-weight: 800;
        border-radius: 14px;
        padding: 12px 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>FlashForge</h1>
      <p>Official public information page for FlashForge.</p>
      <p>Use the link below to open the current privacy policy.</p>
      <a href="./privacy.html">Open Privacy Policy</a>
    </main>
  </body>
  </html>
